<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Question 1</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="container">
            <!-- EDIT QUESTION TEXT HERE -->
            <h2 class="question-text">
                What is the sticker rummy used most to abil?
            </h2>

            <div class="answers-grid">
                <!-- 
              How to configure the onclick function:
              checkAnswer(isCorrect, 'The Correct Answer Text', 'NextPageURL.html')
            -->
                <div
                    class="answer-card bg-blue"
                    onclick="checkAnswer(false, 'text', 'q6.html')"
                >
                    The "couple" Sticker
                </div>
                <div
                    class="answer-card bg-teal"
                    onclick="checkAnswer(false, 'text', 'q6.html')"
                >
                    The "Rummy" Sticker
                </div>
                <div
                    class="answer-card bg-yellow"
                    onclick="checkAnswer(true, 'text', 'q6.html')"
                >
                    the "text" Sticker
                </div>
                <div
                    class="answer-card bg-pink"
                    onclick="checkAnswer(false, 'text', 'q6.html')"
                >
                    the "Apple" Sticker
                </div>
            </div>
        </div>

        <!-- The JavaScript that handles the logic -->
        <script>
            function checkAnswer(isCorrect, correctAnswerText, nextPageUrl) {
                if (isCorrect) {
                    alert('Huh, I Was Right :D');
                } else {
                    alert(
                        "I'm pretty sure its the " + correctAnswerText + ' one.',
                    );
                }

                // Redirect the user to the next page after they click 'OK' on the alert
                window.location.href = nextPageUrl;
            }
        </script>
    </body>
</html>
