<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- EDIT QUESTION TEXT HERE -->
        <h2 class="question-text">which part of your face is this?</h2>
        
        <!-- EDIT IMAGE SOURCE HERE -->
        <img src="assets/pic1.jpeg" alt="Question Image" class="question-image">

       <div class="answers-grid">
            <!-- 
              How to configure the onclick function:
              checkAnswer(isCorrect, 'The Correct Answer Text', 'NextPageURL.html')
            -->
            <div class="answer-card bg-blue" onclick="checkAnswer(true, 'Chin', 'q3.html')">Chin</div>
            <div class="answer-card bg-teal" onclick="checkAnswer(false, 'Chin', 'q2.html')">Eye</div>
            <div class="answer-card bg-yellow" onclick="checkAnswer(false, 'Chin', 'q2.html')">Cheeks</div>
            <div class="answer-card bg-pink" onclick="checkAnswer(false, 'Chin', 'q2.html')">Lips</div>
        </div>
    </div>

    <!-- The JavaScript that handles the logic -->
    <script>
        function checkAnswer(isCorrect, correctAnswerText, nextPageUrl) {
            if (isCorrect) {
                alert("Heyy you know your face!");
            } else {
                alert("hehe, that is your " + correctAnswerText + " (you can ask me what pic was that)");
            }
            
            // Redirect the user to the next page after they click 'OK' on the alert
            window.location.href = nextPageUrl;
        }
    </script>
</body>
</html>
